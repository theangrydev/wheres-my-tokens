# Where's My Tokens - Configuration
# Model pricing in USD per million tokens (API-equivalent pricing)
# Source: https://docs.anthropic.com/en/docs/about-claude/models#model-comparison-table
# These are NOT what you pay on a Claude Code subscription —
# they represent the equivalent API cost for understanding relative token consumption.
#
# Cache pricing uses the 5-minute TTL rate (1.25x input price).
# For 1-hour TTL cache writes, the rate is 2x input price.

pricing:
  # Opus 4.6 / 4.5 — $5 input, $25 output
  claude-opus-4-6:
    input: 5.0
    output: 25.0
    cache_creation: 6.25    # 1.25x input (5-min TTL)
    cache_read: 0.50        # 0.1x input
  claude-opus-4-5-20251101:
    input: 5.0
    output: 25.0
    cache_creation: 6.25
    cache_read: 0.50

  # Opus 4.1 (legacy) — $15 input, $75 output
  claude-opus-4-1-20250805:
    input: 15.0
    output: 75.0
    cache_creation: 18.75
    cache_read: 1.50

  # Sonnet 4.6 / 4.5 / 4.0 — $3 input, $15 output
  claude-sonnet-4-6:
    input: 3.0
    output: 15.0
    cache_creation: 3.75
    cache_read: 0.30
  claude-sonnet-4-5-20250929:
    input: 3.0
    output: 15.0
    cache_creation: 3.75
    cache_read: 0.30
  claude-sonnet-4-20250514:
    input: 3.0
    output: 15.0
    cache_creation: 3.75
    cache_read: 0.30

  # Haiku 4.5 — $1 input, $5 output
  claude-haiku-4-5-20251001:
    input: 1.0
    output: 5.0
    cache_creation: 1.25
    cache_read: 0.10

  # Fallback pricing for unknown models (uses Sonnet pricing as default)
  _default:
    input: 3.0
    output: 15.0
    cache_creation: 3.75
    cache_read: 0.30

# Output directory for generated charts
output_dir: ./output

# Number of items in top-N reports
top_n: 20
